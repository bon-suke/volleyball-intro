import { getFirestore, collection, doc, addDoc, updateDoc, deleteDoc, onSnapshot, getDocs, writeBatch, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// ── State ──

const THEMES = ['theme-gold','theme-blue','theme-purple','theme-green','theme-gold'];

// ── SHA-256 password hashing ──
async function hashPassword(pw) {
  const buf = new TextEncoder().encode(pw);
  const hash = await crypto.subtle.digest('SHA-256', buf);
  return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2,'0')).join('');
}

// ── Image compression (max 400x400, JPEG 0.75) ──
async function compressImage(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        const MAX = 400;
        let { width, height } = img;
        if (width > height) {
          if (width > MAX) { height = Math.round(height * MAX / width); width = MAX; }
        } else {
          if (height > MAX) { width = Math.round(width * MAX / height); height = MAX; }
        }
        const canvas = document.createElement('canvas');
        canvas.width = width; canvas.height = height;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, width, height);
        resolve(canvas.toDataURL('image/jpeg', 0.75));
      };
      img.onerror = reject;
      img.src = e.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

// ── Firestore Realtime Listener ──
function initFirestore() {
  const q = query(membersCol, orderBy('createdAt', 'asc'));
  onSnapshot(q, (snapshot) => {
    members = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
    render();
    document.getElementById('loadingScreen').classList.add('hidden');
    updateSyncStatus(true);
  }, (err) => {
    console.error('Firestore error:', err);
    updateSyncStatus(false);
    document.getElementById('loadingScreen').classList.add('hidden');
    showToast('データの取得に失敗しました');
  });
}

function updateSyncStatus(online) {
  const dot = document.getElementById('syncDot');
  const text = document.getElementById('syncText');
  dot.classList.remove('loading');
  if (online) {
    dot.classList.remove('offline');
    text.textContent = 'リアルタイム同期中';
  } else {
    dot.classList.add('offline');
    text.textContent = 'オフライン';
  }
}

// ── Admin ──
async function getStoredPasswordHash() {
  try {
    const snap = await getDocs(collection(db, "config"));
    const d = snap.docs.find(x => x.id === 'admin');
    return d ? d.data().passwordHash : null;
  } catch(e) { return null; }
}

async function setStoredPasswordHash(hash) {
  const { setDoc } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js");
  await setDoc(configDoc, { passwordHash: hash });
}

function restoreAdminSession() {
  try {
    const s = sessionStorage.getItem(SESSION_KEY);
    if (s === '1') { isAdmin = true; updateAdminUI(); }
  } catch(e) {}
}

window.handleAdminClick = async function() {
  if (isAdmin) {
    isAdmin = false;
    try { sessionStorage.removeItem(SESSION_KEY); } catch(e) {}
    updateAdminUI(); render();
    showToast('管理者モードを終了しました'); return;
  }
  const stored = await getStoredPasswordHash();
  if (!stored) {
    modalMode = 'setup';
    document.getElementById('modalTitle').textContent = '管理者パスワードの設定';
    document.getElementById('modalSub').textContent = '初回のみ：パスワードを設定してください';
    document.getElementById('modalConfirmBtn').textContent = '設定する';
  } else {
    modalMode = 'login';
    document.getElementById('modalTitle').textContent = '管理者ログイン';
    document.getElementById('modalSub').textContent = 'パスワードを入力してください';
    document.getElementById('modalConfirmBtn').textContent = 'ログイン';
  }
  document.getElementById('modalPassword').value = '';
  document.getElementById('modalError').style.display = 'none';
  document.getElementById('modalOverlay').classList.remove('hidden');
  setTimeout(() => document.getElementById('modalPassword').focus(), 100);
};

window.closeModal = function() {
  document.getElementById('modalOverlay').classList.add('hidden');
};

window.modalConfirm = async function() {
  const pw = document.getElementById('modalPassword').value;
  if (!pw) return;
  const hash = await hashPassword(pw);

  if (modalMode === 'setup') {
    if (pw.length < 4) {
      document.getElementById('modalError').textContent = '4文字以上で設定してください';
      document.getElementById('modalError').style.display = 'block'; return;
    }
    try {
      await setStoredPasswordHash(hash);
      isAdmin = true;
      try { sessionStorage.setItem(SESSION_KEY, '1'); } catch(e) {}
      closeModal(); updateAdminUI(); render();
      showToast('パスワードを設定しました 🔐');
    } catch(e) {
      document.getElementById('modalError').textContent = '設定に失敗しました';
      document.getElementById('modalError').style.display = 'block';
    }
  } else if (modalMode === 'login') {
    const stored = await getStoredPasswordHash();
    if (hash !== stored) {
      document.getElementById('modalError').textContent = 'パスワードが違います';
      document.getElementById('modalError').style.display = 'block';
      document.getElementById('modalPassword').value = ''; return;
    }
    isAdmin = true;
    try { sessionStorage.setItem(SESSION_KEY, '1'); } catch(e) {}
    closeModal(); updateAdminUI(); render();
    showToast('管理者モードでログインしました 🔓');
  } else if (modalMode === 'change') {
    if (pw.length < 4) {
      document.getElementById('modalError').textContent = '4文字以上で設定してください';
      document.getElementById('modalError').style.display = 'block'; return;
    }
    try {
      await setStoredPasswordHash(hash);
      closeModal();
      showToast('パスワードを変更しました 🔑');
    } catch(e) {
      document.getElementById('modalError').textContent = '変更に失敗しました';
      document.getElementById('modalError').style.display = 'block';
    }
  }
};

window.changePassword = function() {
  if (!isAdmin) return;
  modalMode = 'change';
  document.getElementById('modalTitle').textContent = 'パスワード変更';
  document.getElementById('modalSub').textContent = '新しいパスワードを入力';
  document.getElementById('modalConfirmBtn').textContent = '変更する';
  document.getElementById('modalPassword').value = '';
  document.getElementById('modalError').style.display = 'none';
  document.getElementById('modalOverlay').classList.remove('hidden');
  setTimeout(() => document.getElementById('modalPassword').focus(), 100);
};

function updateAdminUI() {
  const btn = document.getElementById('adminBtn');
  document.getElementById('adminIcon').textContent = isAdmin ? '🔓' : '🔒';
  document.getElementById('adminLabel').textContent = isAdmin ? 'ログアウト' : '管理者モード';
  btn.classList.toggle('active', isAdmin);
}

// ── Grade chips ──
function buildGradeChips() {
  const row = document.getElementById('gradeRow');
  row.innerHTML = '';
  GRADES.forEach(g => {
    const c = document.createElement('button');
    c.className = 'chip' + (selectedGrade === g ? ' grade-on' : '');
    c.textContent = g;
    c.onclick = () => { selectedGrade = g; buildGradeChips(); updateSubmitState(); };
    row.appendChild(c);
  });
}

// ── Photo ──
window.handlePhoto = async function(ev) {
  const file = ev.target.files?.[0];
  if (!file) return;
  const circle = document.getElementById('photoCircle');
  circle.innerHTML += '<div class="photo-loading">圧縮中...</div>';
  try {
    photoData = await compressImage(file);
    circle.innerHTML = '<img src="' + photoData + '" alt="preview">';
  } catch(e) {
    circle.innerHTML = '<div class="photo-placeholder"><div class="icon">📷</div><div class="text">タップで追加</div></div>';
    showToast('画像の処理に失敗しました');
  }
};

// ── Form ──
window.toggleForm = function() {
  formOpen = !formOpen;
  if (!formOpen) resetForm();
  document.getElementById('formPanel').classList.toggle('hidden', !formOpen);
  document.getElementById('plusIcon').classList.toggle('open', formOpen);
  document.getElementById('toggleLabel').textContent = formOpen ? 'キャンセル' : '自己紹介を投稿';
  document.getElementById('toggleFormBtn').classList.toggle('cancel', formOpen);
};

function resetForm() {
  editingId = null;
  document.getElementById('formTitle').textContent = '新規投稿';
  document.getElementById('nameInput').value = '';
  document.getElementById('originInput').value = '';
  document.getElementById('vhistoryInput').value = '';
  document.getElementById('hobbyInput').value = '';
  selectedGrade = ''; photoData = null;
  document.getElementById('photoCircle').innerHTML = '<div class="photo-placeholder"><div class="icon">📷</div><div class="text">タップで追加</div></div>';
  document.getElementById('photoInput').value = '';
  buildGradeChips(); updateSubmitState();
}

function updateSubmitState() {
  if (submitting) return;
  const ok = document.getElementById('nameInput').value.trim() && selectedGrade;
  document.getElementById('submitBtn').className = 'btn-submit ' + (ok ? 'active' : 'inactive');
}

window.submitMember = async function() {
  if (submitting) return;
  const name = document.getElementById('nameInput').value.trim();
  if (!name || !selectedGrade) return;

  submitting = true;
  const btn = document.getElementById('submitBtn');
  btn.className = 'btn-submit loading';
  btn.textContent = editingId ? '更新中...' : '投稿中...';

  const data = {
    name,
    grade: selectedGrade,
    origin: document.getElementById('originInput').value.trim(),
    vhistory: document.getElementById('vhistoryInput').value.trim(),
    hobby: document.getElementById('hobbyInput').value.trim(),
    photo: photoData || null
  };

  try {
    if (editingId) {
      await updateDoc(doc(db, "members", editingId), data);
      showToast('更新しました ✏️');
    } else {
      data.createdAt = serverTimestamp();
      await addDoc(membersCol, data);
      showToast('投稿しました！🏐');
    }
    resetForm();
    formOpen = false;
    document.getElementById('formPanel').classList.add('hidden');
    document.getElementById('plusIcon').classList.remove('open');
    document.getElementById('toggleLabel').textContent = '自己紹介を投稿';
    document.getElementById('toggleFormBtn').classList.remove('cancel');
  } catch(e) {
    console.error(e);
    showToast('保存に失敗しました');
  } finally {
    submitting = false;
    btn.textContent = '投稿する 🏐';
    updateSubmitState();
  }
};

// ── Edit ──
window.editMember = function(id) {
  if (!isAdmin) { showToast('編集は管理者のみ可能です 🔒'); return; }
  const m = members.find(x => x.id === id);
  if (!m) return;
  editingId = id;
  document.getElementById('formTitle').textContent = '編集';
  document.getElementById('nameInput').value = m.name || '';
  document.getElementById('originInput').value = m.origin || '';
  document.getElementById('vhistoryInput').value = m.vhistory || '';
  document.getElementById('hobbyInput').value = m.hobby || '';
  selectedGrade = m.grade || '';
  photoData = m.photo || null;
  buildGradeChips();
  const circle = document.getElementById('photoCircle');
  if (photoData) circle.innerHTML = '<img src="' + photoData + '" alt="preview">';
  else circle.innerHTML = '<div class="photo-placeholder"><div class="icon">📷</div><div class="text">タップで追加</div></div>';
  updateSubmitState();
  formOpen = true;
  document.getElementById('formPanel').classList.remove('hidden');
  document.getElementById('plusIcon').classList.add('open');
  document.getElementById('toggleLabel').textContent = 'キャンセル';
  document.getElementById('toggleFormBtn').classList.add('cancel');
  document.getElementById('formPanel').scrollIntoView({ behavior: 'smooth', block: 'start' });
};

// ── Delete ──
window.deleteMember = async function(id) {
  if (!isAdmin) { showToast('削除は管理者のみ可能です 🔒'); return; }
  if (!confirm('このメンバーを削除しますか？')) return;
  try {
    await deleteDoc(doc(db, "members", id));
    showToast('削除しました');
  } catch(e) { showToast('削除に失敗しました'); }
};

window.resetAll = async function() {
  if (!isAdmin) { showToast('リセットは管理者のみ可能です 🔒'); return; }
  if (!confirm('全てのメンバーを削除しますか？この操作は取り消せません。')) return;
  try {
    const snap = await getDocs(membersCol);
    const batch = writeBatch(db);
    snap.docs.forEach(d => batch.delete(d.ref));
    await batch.commit();
    showToast('リセットしました');
  } catch(e) { showToast('リセットに失敗しました'); }
};

window.flipCard = function(id) {
  const el = document.getElementById('card-' + id);
  if (el) el.classList.toggle('flipped');
};

// ── Render ──
function render() {
  const area = document.getElementById('memberArea');
  const statsArea = document.getElementById('statsArea');
  const toolbar = document.getElementById('dataToolbar');
  toolbar.style.display = isAdmin ? '' : 'none';

  if (members.length === 0) {
    area.innerHTML = '<div class="empty"><div class="ball">🏐</div><p>まだメンバーがいません<br>「自己紹介を投稿」から始めましょう！</p></div>';
    statsArea.innerHTML = ''; return;
  }

  const grouped = {};
  GRADE_ORDER.forEach(g => { grouped[g] = []; });
  members.forEach(m => {
    const g = GRADE_ORDER.includes(m.grade) ? m.grade : '';
    grouped[g].push(m);
  });

  let html = '', cardIdx = 0;
  GRADE_ORDER.forEach((grade, gi) => {
    const list = grouped[grade];
    if (!list.length) return;
    const label = grade || '未設定';
    html += '<div class="grade-section"><div class="grade-section-header"><div class="grade-section-title">' + escHtml(label) + '</div><div class="grade-section-count">' + list.length + '人</div><div class="grade-section-line"></div></div><div class="grid">';
    list.forEach(m => {
      const theme = THEMES[gi % THEMES.length];
      const avatar = m.photo
        ? '<img src="' + m.photo + '" alt="' + escHtml(m.name) + '">'
        : '<div class="avatar-letter">' + (m.name?.[0] || '?') + '</div>';
      const gradeH = m.grade ? '<div class="member-grade">' + escHtml(m.grade) + '</div>' : '';
      let tags = '';
      if (m.origin) tags += '<span class="info-tag">📍' + escHtml(m.origin) + '</span>';
      if (m.vhistory) tags += '<span class="info-tag">🏐' + escHtml(m.vhistory) + '</span>';
      let details = '';
      if (m.origin) details += '<div class="detail-box"><div class="detail-label">出身地</div><div class="detail-text">' + escHtml(m.origin) + '</div></div>';
      if (m.vhistory) details += '<div class="detail-box"><div class="detail-label">バレー歴</div><div class="detail-text">' + escHtml(m.vhistory) + '</div></div>';
      if (m.hobby) details += '<div class="detail-box"><div class="detail-label">趣味</div><div class="detail-text">' + escHtml(m.hobby) + '</div></div>';
      if (!details) details = '<div class="back-msg">よろしくお願いします！🏐</div>';
      const actions = isAdmin
        ? '<div class="card-actions"><button class="icon-btn edit" onclick="event.stopPropagation();editMember(\'' + m.id + '\')">✎</button><button class="icon-btn delete" onclick="event.stopPropagation();deleteMember(\'' + m.id + '\')">✕</button></div>'
        : '';
      html += '<div class="card-wrap" style="animation:cardIn .5s ease-out ' + cardIdx*0.06 + 's both"><div class="card-inner" id="card-' + m.id + '" onclick="flipCard(\'' + m.id + '\')"><div class="card-face ' + theme + '"><div class="top-bar" style="background:linear-gradient(90deg,rgba(255,255,255,.1),rgba(255,255,255,.25),rgba(255,255,255,.1))"></div><div class="card-front"><div class="avatar" style="border:2px solid rgba(255,255,255,.2);box-shadow:0 0 16px rgba(255,255,255,.1)">' + avatar + '</div><div class="member-name">' + escHtml(m.name) + '</div>' + gradeH + '<div class="info-row">' + tags + '</div></div></div><div class="card-face card-back"><svg width="32" height="32" viewBox="0 0 100 100" fill="none"><circle cx="50" cy="50" r="46" stroke="rgba(255,255,255,.2)" stroke-width="3"/><path d="M50 4C50 4,30 35,50 50C70 65,50 96,50 96" stroke="rgba(255,255,255,.2)" stroke-width="2.5"/><path d="M8 30C8 30,45 40,50 50C55 60,92 70,92 70" stroke="rgba(255,255,255,.2)" stroke-width="2.5"/><path d="M8 70C8 70,40 55,50 50C60 45,92 30,92 30" stroke="rgba(255,255,255,.2)" stroke-width="2.5"/></svg><div class="back-name">' + escHtml(m.name) + '</div><div class="back-sub">' + escHtml(m.grade || '') + '</div>' + details + '</div></div>' + actions + '</div>';
      cardIdx++;
    });
    html += '</div></div>';
  });
  area.innerHTML = html;

  const gradeCounts = GRADE_ORDER.filter(g => g).map(g => ({ label: g, count: grouped[g].length })).filter(x => x.count > 0);
  let sh = '<div class="stats"><div class="stats-inner">';
  gradeCounts.forEach((gc, i) => {
    if (i > 0) sh += '<div class="stat-sep"></div>';
    sh += '<div class="stat-item"><div class="stat-num" style="color:rgba(255,255,255,.8)">' + gc.count + '</div><div class="stat-label">' + gc.label + '</div></div>';
  });
  sh += '<div class="stat-sep"></div><div class="stat-item"><div class="stat-num" style="color:#ffb74d">' + members.length + '</div><div class="stat-label">合計</div></div></div></div>';
  statsArea.innerHTML = sh;
}

// ── JSON Export ──
window.exportJSON = function() {
  const data = members.map(m => ({
    name: m.name, grade: m.grade, origin: m.origin,
    vhistory: m.vhistory, hobby: m.hobby, photo: m.photo || null
  }));
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url; a.download = 'cav-members.json';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast('JSONをエクスポートしました 📤');
};

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.remove('hide');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.add('hide'), 2500);
}

function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s || '';
  return d.innerHTML;
}

// ── Init ──
buildGradeChips();
restoreAdminSession();
initFirestore();
document.getElementById('nameInput').addEventListener('input', updateSubmitState);

// Expose for inline handlers
window.render = render;
</script>
</body>
</html>
