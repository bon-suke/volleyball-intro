<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>c.a.v. 自己紹介</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Zen Maru Gothic',sans-serif;min-height:100vh;background:linear-gradient(170deg,#0a0a1a 0%,#0d1b2a 40%,#1b2838 100%);color:#fff;overflow-x:hidden}

  @keyframes cardIn{from{opacity:0;transform:translateY(24px) scale(.95)}to{opacity:1;transform:translateY(0) scale(1)}}
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  @keyframes slideUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
  @keyframes floatBall{0%,100%{transform:translateY(0) rotate(0)}50%{transform:translateY(-12px) rotate(15deg)}}

  .bg-ball{position:fixed;pointer-events:none;opacity:.04}
  .bg-ball-1{top:-80px;right:-80px;animation:floatBall 6s ease-in-out infinite}
  .bg-ball-2{bottom:-60px;left:-40px;animation:floatBall 8s ease-in-out infinite 2s}

  header{padding:40px 20px 20px;text-align:center}
  .header-row{display:inline-flex;align-items:center;gap:12px;margin-bottom:8px;animation:slideUp .6s ease-out}
  .header-icon{animation:floatBall 3s ease-in-out infinite}
  h1{font-size:28px;font-weight:900;letter-spacing:.04em;background:linear-gradient(135deg,#ffb74d,#ff8a65,#ffcc80);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
  .subtitle{color:rgba(255,255,255,.4);font-size:13px;animation:slideUp .6s ease-out .1s both}

  .actions{display:flex;justify-content:center;flex-wrap:wrap;gap:10px;padding:0 20px 24px;animation:slideUp .6s ease-out .2s both}
  .btn{padding:12px 22px;border-radius:14px;border:none;font-size:14px;font-weight:700;font-family:'Zen Maru Gothic',sans-serif;cursor:pointer;transition:all .3s ease;display:inline-flex;align-items:center;gap:8px}
  .btn-primary{background:linear-gradient(135deg,#ff6f00,#ff8f00);color:#fff;box-shadow:0 4px 20px rgba(255,111,0,.3)}
  .btn-primary.cancel{background:rgba(255,255,255,.08);box-shadow:none}
  .btn-ghost{padding:12px 16px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.05);color:rgba(255,255,255,.4)}
  .btn-ghost:hover{background:rgba(255,255,255,.08)}
  .btn-icon-rotate{display:inline-block;font-size:18px;transition:transform .3s ease}
  .btn-icon-rotate.open{transform:rotate(45deg)}

  .admin-bar{display:flex;justify-content:center;padding:0 20px 16px;animation:slideUp .6s ease-out .15s both}
  .btn-admin{padding:10px 20px;border-radius:12px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.05);color:rgba(255,255,255,.4);font-size:13px;font-weight:600;font-family:'Zen Maru Gothic',sans-serif;cursor:pointer;transition:all .3s;display:inline-flex;align-items:center;gap:6px}
  .btn-admin:hover{background:rgba(255,255,255,.08)}
  .btn-admin.active{border-color:rgba(239,83,80,.4);background:rgba(239,83,80,.1);color:#ef9a9a}

  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;z-index:200;animation:fadeIn .2s ease-out}
  .modal-overlay.hidden{display:none}
  .modal{background:linear-gradient(145deg,#1a1a2e,#16213e);border:1px solid rgba(255,255,255,.1);border-radius:20px;padding:32px;width:calc(100% - 40px);max-width:360px;animation:slideUp .3s ease-out}
  .modal h2{font-size:18px;font-weight:700;margin-bottom:6px;text-align:center}
  .modal .modal-sub{font-size:12px;color:rgba(255,255,255,.4);text-align:center;margin-bottom:20px}
  .modal input[type="password"]{width:100%;padding:14px 18px;border-radius:12px;border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.05);color:#fff;font-size:16px;font-family:'Zen Maru Gothic',sans-serif;outline:none;transition:border-color .3s;margin-bottom:16px}
  .modal input[type="password"]:focus{border-color:rgba(239,83,80,.5)}
  .modal input[type="password"]::placeholder{color:rgba(255,255,255,.25)}
  .modal .modal-actions{display:flex;gap:10px}
  .modal .modal-actions button{flex:1;padding:14px;border-radius:12px;border:none;font-size:15px;font-weight:700;font-family:'Zen Maru Gothic',sans-serif;cursor:pointer;transition:all .3s}
  .modal .btn-cancel{background:rgba(255,255,255,.08);color:rgba(255,255,255,.5)}
  .modal .btn-confirm{background:linear-gradient(135deg,#ef5350,#e53935);color:#fff;box-shadow:0 4px 16px rgba(239,83,80,.25)}
  .modal .error-msg{color:#ef5350;font-size:12px;text-align:center;margin-bottom:12px;display:none}

  .form-panel{margin:0 auto 28px;padding:28px;border-radius:20px;max-width:500px;width:calc(100% - 40px);background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);backdrop-filter:blur(12px);animation:slideUp .4s ease-out}
  .form-panel.hidden{display:none}
  .photo-upload{display:flex;flex-direction:column;align-items:center;margin-bottom:24px;cursor:pointer}
  .photo-circle{width:100px;height:100px;border-radius:50%;border:2px dashed rgba(255,255,255,.2);overflow:hidden;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.03);transition:border-color .3s}
  .photo-circle:hover{border-color:rgba(255,183,77,.4)}
  .photo-circle img{width:100%;height:100%;object-fit:cover}
  .photo-placeholder{text-align:center;color:rgba(255,255,255,.3)}
  .photo-placeholder .icon{font-size:28px;margin-bottom:4px}
  .photo-placeholder .text{font-size:10px}
  .photo-hint{color:rgba(255,255,255,.35);font-size:11px;margin-top:8px}

  .field{margin-bottom:20px}
  .field label{color:rgba(255,255,255,.5);font-size:12px;font-weight:600;display:block;margin-bottom:8px}
  .field input[type="text"]{width:100%;padding:14px 18px;border-radius:12px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.05);color:#fff;font-size:16px;font-family:'Zen Maru Gothic',sans-serif;outline:none;transition:border-color .3s}
  .field input[type="text"]:focus{border-color:rgba(255,183,77,.5)}
  .field input[type="text"]::placeholder{color:rgba(255,255,255,.25)}

  .chip-row{display:flex;gap:8px;flex-wrap:wrap}
  .chip{padding:10px 16px;border-radius:10px;border:2px solid rgba(255,255,255,.08);background:rgba(255,255,255,.03);color:rgba(255,255,255,.4);font-size:14px;font-weight:600;font-family:'Zen Maru Gothic',sans-serif;cursor:pointer;transition:all .3s;display:flex;align-items:center;gap:6px}
  .chip.grade-on{border-color:#a5d6a7;background:rgba(165,214,167,.12);color:#c8e6c9}

  .btn-submit{width:100%;padding:16px;border-radius:14px;border:none;font-size:16px;font-weight:700;font-family:'Zen Maru Gothic',sans-serif;cursor:pointer;transition:all .3s}
  .btn-submit.active{background:linear-gradient(135deg,#ff6f00,#ff8f00);color:#fff;box-shadow:0 4px 20px rgba(255,111,0,.25)}
  .btn-submit.inactive{background:rgba(255,255,255,.05);color:rgba(255,255,255,.2);cursor:default}

  .grade-section{padding:0 20px 12px;max-width:800px;margin:0 auto}
  .grade-section-header{display:flex;align-items:center;gap:10px;margin-bottom:14px;padding:0 4px}
  .grade-section-title{font-size:17px;font-weight:700;color:rgba(255,255,255,.7)}
  .grade-section-count{font-size:12px;color:rgba(255,255,255,.3);background:rgba(255,255,255,.06);padding:3px 10px;border-radius:10px}
  .grade-section-line{flex:1;height:1px;background:rgba(255,255,255,.08)}

  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:16px;margin-bottom:28px}
  .card-wrap{position:relative;perspective:800px;cursor:pointer}
  .card-inner{position:relative;width:100%;padding-bottom:140%;transform-style:preserve-3d;transition:transform .6s cubic-bezier(.34,1.56,.64,1)}
  .card-inner.flipped{transform:rotateY(180deg)}
  .card-face{position:absolute;inset:0;backface-visibility:hidden;border-radius:20px;overflow:hidden}

  .card-front{display:flex;flex-direction:column;align-items:center;padding:24px 14px 16px;height:100%}
  .card-front .top-bar{position:absolute;top:0;left:0;right:0;height:5px}
  .card-front .avatar{width:72px;height:72px;border-radius:50%;overflow:hidden;flex-shrink:0}
  .card-front .avatar img{width:100%;height:100%;object-fit:cover}
  .card-front .avatar-letter{width:100%;height:100%;background:rgba(255,255,255,.08);display:flex;align-items:center;justify-content:center;font-size:28px;color:rgba(255,255,255,.5)}
  .card-front .member-name{font-size:16px;font-weight:700;margin:10px 0 2px;text-align:center;word-break:break-all}
  .card-front .member-grade{font-size:11px;color:rgba(255,255,255,.45);margin-bottom:6px}
  .card-front .info-row{display:flex;flex-wrap:wrap;gap:4px;justify-content:center;margin-top:4px}
  .card-front .info-tag{font-size:10px;padding:3px 8px;border-radius:8px;background:rgba(255,255,255,.06);color:rgba(255,255,255,.5)}

  .card-back{transform:rotateY(180deg);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:18px;text-align:center;background:linear-gradient(145deg,#0f3460,#1a1a2e);border:2px solid rgba(255,255,255,.1)}
  .card-back .back-name{font-size:15px;font-weight:700;margin-top:10px}
  .card-back .back-sub{font-size:11px;color:rgba(255,255,255,.45);margin-top:2px}
  .card-back .detail-box{margin-top:10px;padding:10px 14px;border-radius:12px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);width:100%;text-align:left}
  .card-back .detail-label{font-size:10px;font-weight:600;color:rgba(255,255,255,.35);margin-bottom:2px}
  .card-back .detail-text{font-size:12px;color:rgba(255,255,255,.8);line-height:1.5;word-break:break-all}
  .card-back .detail-box+.detail-box{margin-top:6px}
  .card-back .back-msg{font-size:13px;color:rgba(255,255,255,.4);margin-top:12px}

  .delete-btn{position:absolute;top:8px;right:8px;width:26px;height:26px;border-radius:50%;border:none;background:rgba(0,0,0,.5);color:rgba(255,255,255,.5);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:10;opacity:.6;transition:opacity .2s}
  .delete-btn:hover{opacity:1}

  .empty{text-align:center;padding:60px 20px;animation:fadeIn .6s ease-out .3s both}
  .empty .ball{font-size:48px;margin-bottom:16px;animation:floatBall 4s ease-in-out infinite}
  .empty p{color:rgba(255,255,255,.3);font-size:15px;line-height:1.8}

  .stats{text-align:center;padding:0 20px 40px;animation:fadeIn .6s ease-out}
  .stats-inner{display:inline-flex;gap:20px;padding:14px 24px;border-radius:16px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);flex-wrap:wrap;justify-content:center}
  .stat-item{text-align:center}
  .stat-num{font-size:22px;font-weight:900}
  .stat-label{font-size:11px;color:rgba(255,255,255,.35)}
  .stat-sep{width:1px;background:rgba(255,255,255,.08)}

  .data-toolbar{display:flex;justify-content:center;flex-wrap:wrap;gap:10px;padding:0 20px 32px;animation:slideUp .6s ease-out .3s both}
  .data-toolbar .btn{font-size:13px;padding:10px 18px;border-radius:12px}

  .toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);padding:14px 28px;border-radius:14px;background:rgba(40,40,60,.95);border:1px solid rgba(255,255,255,.1);color:#fff;font-size:14px;font-family:'Zen Maru Gothic',sans-serif;backdrop-filter:blur(12px);animation:slideUp .3s ease-out;z-index:100;pointer-events:none}
  .toast.hide{opacity:0;transition:opacity .3s}

  .theme-gold{background:linear-gradient(145deg,#1a1a2e,#16213e 50%,#0f3460);border:2px solid rgba(255,183,77,.3);box-shadow:0 8px 32px rgba(255,183,77,.1)}
  .theme-blue{background:linear-gradient(145deg,#1a1a2e,#162a3e 50%,#0f4460);border:2px solid rgba(129,212,250,.3);box-shadow:0 8px 32px rgba(129,212,250,.1)}
  .theme-purple{background:linear-gradient(145deg,#2d1b4e,#1a1a2e 50%,#16213e);border:2px solid rgba(206,147,216,.3);box-shadow:0 8px 32px rgba(206,147,216,.1)}
  .theme-green{background:linear-gradient(145deg,#1a2e1a,#163e1e 50%,#0f4630);border:2px solid rgba(165,214,167,.3);box-shadow:0 8px 32px rgba(165,214,167,.1)}
</style>
</head>
<body>

<div class="bg-ball bg-ball-1">
  <svg width="280" height="280" viewBox="0 0 100 100" fill="none"><circle cx="50" cy="50" r="46" stroke="#fff" stroke-width="3"/><path d="M50 4C50 4,30 35,50 50C70 65,50 96,50 96" stroke="#fff" stroke-width="2.5"/><path d="M8 30C8 30,45 40,50 50C55 60,92 70,92 70" stroke="#fff" stroke-width="2.5"/><path d="M8 70C8 70,40 55,50 50C60 45,92 30,92 30" stroke="#fff" stroke-width="2.5"/></svg>
</div>
<div class="bg-ball bg-ball-2">
  <svg width="200" height="200" viewBox="0 0 100 100" fill="none"><circle cx="50" cy="50" r="46" stroke="#fff" stroke-width="3"/><path d="M50 4C50 4,30 35,50 50C70 65,50 96,50 96" stroke="#fff" stroke-width="2.5"/><path d="M8 30C8 30,45 40,50 50C55 60,92 70,92 70" stroke="#fff" stroke-width="2.5"/><path d="M8 70C8 70,40 55,50 50C60 45,92 30,92 30" stroke="#fff" stroke-width="2.5"/></svg>
</div>

<header>
  <div class="header-row">
    <span class="header-icon">
      <svg width="36" height="36" viewBox="0 0 100 100" fill="none"><circle cx="50" cy="50" r="46" stroke="#ffb74d" stroke-width="3"/><path d="M50 4C50 4,30 35,50 50C70 65,50 96,50 96" stroke="#ffb74d" stroke-width="2.5"/><path d="M8 30C8 30,45 40,50 50C55 60,92 70,92 70" stroke="#ffb74d" stroke-width="2.5"/><path d="M8 70C8 70,40 55,50 50C60 45,92 30,92 30" stroke="#ffb74d" stroke-width="2.5"/></svg>
    </span>
    <h1>c.a.v. 自己紹介</h1>
  </div>
  <p class="subtitle">メンバー紹介ページ</p>
</header>

<div class="actions">
  <button class="btn btn-primary" id="toggleFormBtn" onclick="toggleForm()">
    <span class="btn-icon-rotate" id="plusIcon">＋</span>
    <span id="toggleLabel">自己紹介を投稿</span>
  </button>
</div>

<div class="admin-bar">
  <button class="btn-admin" id="adminBtn" onclick="handleAdminClick()">
    <span id="adminIcon">🔒</span>
    <span id="adminLabel">管理者モード</span>
  </button>
</div>

<div class="modal-overlay hidden" id="modalOverlay" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <h2 id="modalTitle">管理者ログイン</h2>
    <p class="modal-sub" id="modalSub">パスワードを入力してください</p>
    <div class="error-msg" id="modalError">パスワードが違います</div>
    <input type="password" id="modalPassword" placeholder="パスワード" onkeydown="if(event.key==='Enter')modalConfirm()">
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">キャンセル</button>
      <button class="btn-confirm" id="modalConfirmBtn" onclick="modalConfirm()">ログイン</button>
    </div>
  </div>
</div>

<div class="form-panel hidden" id="formPanel">
  <div class="photo-upload" onclick="document.getElementById('photoInput').click()">
    <div class="photo-circle" id="photoCircle">
      <div class="photo-placeholder">
        <div class="icon">📷</div>
        <div class="text">タップで追加</div>
      </div>
    </div>
    <input type="file" id="photoInput" accept="image/*" style="display:none" onchange="handlePhoto(event)">
    <span class="photo-hint">顔写真（任意）</span>
  </div>

  <div class="field"><label>名前 *</label><input type="text" id="nameInput" placeholder="ニックネームでもOK"></div>
  <div class="field"><label>回生 *</label><div class="chip-row" id="gradeRow"></div></div>
  <div class="field"><label>出身地</label><input type="text" id="originInput" placeholder="例：大阪、東京"></div>
  <div class="field"><label>バレー歴</label><input type="text" id="vhistoryInput" placeholder="例：3年、6ヶ月、未経験"></div>
  <div class="field"><label>趣味</label><input type="text" id="hobbyInput" placeholder="例：映画鑑賞、旅行、ゲーム"></div>

  <button class="btn-submit inactive" id="submitBtn" onclick="submitMember()">投稿する 🏐</button>
</div>

<div class="data-toolbar" id="dataToolbar" style="display:none">
  <button class="btn btn-ghost" onclick="exportJSON()">📤 JSONエクスポート</button>
  <button class="btn btn-ghost" onclick="document.getElementById('importInput').click()">📥 JSONインポート</button>
  <button class="btn btn-ghost" onclick="resetAll()" style="color:#ef9a9a;border-color:rgba(239,83,80,.3)">🗑 全員リセット</button>
  <input type="file" id="importInput" accept=".json" style="display:none" onchange="importJSON(event)">
</div>

<div id="memberArea"></div>
<div id="statsArea"></div>
<div class="toast hide" id="toast"></div>

<script>
let members=[], formOpen=false, selectedGrade='', photoData=null, isAdmin=false, modalMode='';
const GRADES=['1回生','2回生','3回生','4回生','それ以上'];
const GRADE_ORDER=['1回生','2回生','3回生','4回生','それ以上',''];
const THEMES=['theme-gold','theme-blue','theme-purple','theme-green','theme-gold'];
const PW_KEY='cav-admin-pw';

function init(){
  try{ const s=localStorage.getItem('cav-members'); if(s) members=JSON.parse(s); }catch(e){}
  buildGradeChips(); render(); updateAdminUI();
  document.getElementById('nameInput').addEventListener('input',updateSubmitState);
}
function save(){ try{localStorage.setItem('cav-members',JSON.stringify(members));}catch(e){} }

// Admin
function getStoredPassword(){ try{return localStorage.getItem(PW_KEY);}catch(e){return null;} }
function setStoredPassword(pw){ try{localStorage.setItem(PW_KEY,pw);}catch(e){} }
function handleAdminClick(){
  if(isAdmin){ isAdmin=false; updateAdminUI(); render(); showToast('管理者モードを終了しました'); return; }
  const stored=getStoredPassword();
  if(!stored){
    modalMode='setup';
    document.getElementById('modalTitle').textContent='管理者パスワードの設定';
    document.getElementById('modalSub').textContent='初回のみ：パスワードを設定してください';
    document.getElementById('modalConfirmBtn').textContent='設定する';
  } else {
    modalMode='login';
    document.getElementById('modalTitle').textContent='管理者ログイン';
    document.getElementById('modalSub').textContent='パスワードを入力してください';
    document.getElementById('modalConfirmBtn').textContent='ログイン';
  }
  document.getElementById('modalPassword').value='';
  document.getElementById('modalError').style.display='none';
  document.getElementById('modalOverlay').classList.remove('hidden');
  setTimeout(()=>document.getElementById('modalPassword').focus(),100);
}
function closeModal(){ document.getElementById('modalOverlay').classList.add('hidden'); }
function modalConfirm(){
  const pw=document.getElementById('modalPassword').value;
  if(!pw) return;
  if(modalMode==='setup'){
    if(pw.length<4){ document.getElementById('modalError').textContent='4文字以上で設定してください'; document.getElementById('modalError').style.display='block'; return; }
    setStoredPassword(pw); isAdmin=true; closeModal(); updateAdminUI(); render(); showToast('パスワードを設定しました 🔐');
  } else {
    if(pw!==getStoredPassword()){ document.getElementById('modalError').textContent='パスワードが違います'; document.getElementById('modalError').style.display='block'; document.getElementById('modalPassword').value=''; return; }
    isAdmin=true; closeModal(); updateAdminUI(); render(); showToast('管理者モードでログインしました 🔓');
  }
}
function updateAdminUI(){
  const btn=document.getElementById('adminBtn');
  document.getElementById('adminIcon').textContent=isAdmin?'🔓':'🔒';
  document.getElementById('adminLabel').textContent=isAdmin?'ログアウト':'管理者モード';
  btn.classList.toggle('active',isAdmin);
}

// Grade chips
function buildGradeChips(){
  const row=document.getElementById('gradeRow'); row.innerHTML='';
  GRADES.forEach(g=>{
    const c=document.createElement('button');
    c.className='chip'+(selectedGrade===g?' grade-on':'');
    c.textContent=g;
    c.onclick=()=>{ selectedGrade=g; buildGradeChips(); updateSubmitState(); };
    row.appendChild(c);
  });
}

// Photo
function handlePhoto(ev){
  const file=ev.target.files?.[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=(e)=>{ photoData=e.target.result; document.getElementById('photoCircle').innerHTML='<img src="'+photoData+'" alt="preview">'; };
  reader.readAsDataURL(file);
}

// Form
function toggleForm(){
  formOpen=!formOpen;
  document.getElementById('formPanel').classList.toggle('hidden',!formOpen);
  document.getElementById('plusIcon').classList.toggle('open',formOpen);
  document.getElementById('toggleLabel').textContent=formOpen?'キャンセル':'自己紹介を投稿';
  document.getElementById('toggleFormBtn').classList.toggle('cancel',formOpen);
}
function updateSubmitState(){
  const ok=document.getElementById('nameInput').value.trim()&&selectedGrade;
  document.getElementById('submitBtn').className='btn-submit '+(ok?'active':'inactive');
}
function submitMember(){
  const name=document.getElementById('nameInput').value.trim();
  if(!name||!selectedGrade) return;
  members.push({ id:Date.now(), name, grade:selectedGrade,
    origin:document.getElementById('originInput').value.trim(),
    vhistory:document.getElementById('vhistoryInput').value.trim(),
    hobby:document.getElementById('hobbyInput').value.trim(),
    photo:photoData });
  save();
  document.getElementById('nameInput').value='';
  document.getElementById('originInput').value='';
  document.getElementById('vhistoryInput').value='';
  document.getElementById('hobbyInput').value='';
  selectedGrade=''; photoData=null;
  document.getElementById('photoCircle').innerHTML='<div class="photo-placeholder"><div class="icon">📷</div><div class="text">タップで追加</div></div>';
  document.getElementById('photoInput').value='';
  buildGradeChips(); updateSubmitState();
  formOpen=false;
  document.getElementById('formPanel').classList.add('hidden');
  document.getElementById('plusIcon').classList.remove('open');
  document.getElementById('toggleLabel').textContent='自己紹介を投稿';
  document.getElementById('toggleFormBtn').classList.remove('cancel');
  render(); showToast('投稿しました！🏐');
}

// Delete
function deleteMember(id){
  if(!isAdmin){showToast('削除は管理者のみ可能です 🔒');return;}
  if(!confirm('このメンバーを削除しますか？'))return;
  members=members.filter(m=>m.id!==id); save(); render(); showToast('削除しました');
}
function resetAll(){
  if(!isAdmin){showToast('リセットは管理者のみ可能です 🔒');return;}
  if(!confirm('全てのメンバーを削除しますか？'))return;
  members=[]; try{localStorage.removeItem('cav-members');}catch(e){} render(); showToast('リセットしました');
}
function flipCard(id){ const el=document.getElementById('card-'+id); if(el) el.classList.toggle('flipped'); }

// Render
function render(){
  const area=document.getElementById('memberArea'), statsArea=document.getElementById('statsArea'), toolbar=document.getElementById('dataToolbar');
  toolbar.style.display=(members.length>0&&isAdmin)?'':'none';
  if(members.length===0){
    area.innerHTML='<div class="empty"><div class="ball">🏐</div><p>まだメンバーがいません<br>「自己紹介を投稿」から始めましょう！</p></div>';
    statsArea.innerHTML=''; return;
  }
  const grouped={}; GRADE_ORDER.forEach(g=>{grouped[g]=[];});
  members.forEach(m=>{ const g=GRADE_ORDER.includes(m.grade)?m.grade:''; grouped[g].push(m); });

  let html='', cardIdx=0;
  GRADE_ORDER.forEach((grade,gi)=>{
    const list=grouped[grade]; if(!list.length) return;
    const label=grade||'未設定';
    html+='<div class="grade-section"><div class="grade-section-header"><div class="grade-section-title">'+escHtml(label)+'</div><div class="grade-section-count">'+list.length+'人</div><div class="grade-section-line"></div></div><div class="grid">';
    list.forEach(m=>{
      const theme=THEMES[gi%THEMES.length];
      const avatar=m.photo?'<img src="'+m.photo+'" alt="'+escHtml(m.name)+'">':'<div class="avatar-letter">'+(m.name?.[0]||'?')+'</div>';
      const gradeH=m.grade?'<div class="member-grade">'+escHtml(m.grade)+'</div>':'';
      let tags='';
      if(m.origin) tags+='<span class="info-tag">📍'+escHtml(m.origin)+'</span>';
      if(m.vhistory) tags+='<span class="info-tag">🏐'+escHtml(m.vhistory)+'</span>';
      let details='';
      if(m.origin) details+='<div class="detail-box"><div class="detail-label">出身地</div><div class="detail-text">'+escHtml(m.origin)+'</div></div>';
      if(m.vhistory) details+='<div class="detail-box"><div class="detail-label">バレー歴</div><div class="detail-text">'+escHtml(m.vhistory)+'</div></div>';
      if(m.hobby) details+='<div class="detail-box"><div class="detail-label">趣味</div><div class="detail-text">'+escHtml(m.hobby)+'</div></div>';
      if(!details) details='<div class="back-msg">よろしくお願いします！🏐</div>';
      const del=isAdmin?'<button class="delete-btn" onclick="event.stopPropagation();deleteMember('+m.id+')">✕</button>':'';
      html+='<div class="card-wrap" style="animation:cardIn .5s ease-out '+cardIdx*0.06+'s both"><div class="card-inner" id="card-'+m.id+'" onclick="flipCard('+m.id+')"><div class="card-face '+theme+'"><div class="top-bar" style="background:linear-gradient(90deg,rgba(255,255,255,.1),rgba(255,255,255,.25),rgba(255,255,255,.1))"></div><div class="card-front"><div class="avatar" style="border:2px solid rgba(255,255,255,.2);box-shadow:0 0 16px rgba(255,255,255,.1)">'+avatar+'</div><div class="member-name">'+escHtml(m.name)+'</div>'+gradeH+'<div class="info-row">'+tags+'</div></div></div><div class="card-face card-back"><svg width="32" height="32" viewBox="0 0 100 100" fill="none"><circle cx="50" cy="50" r="46" stroke="rgba(255,255,255,.2)" stroke-width="3"/><path d="M50 4C50 4,30 35,50 50C70 65,50 96,50 96" stroke="rgba(255,255,255,.2)" stroke-width="2.5"/><path d="M8 30C8 30,45 40,50 50C55 60,92 70,92 70" stroke="rgba(255,255,255,.2)" stroke-width="2.5"/><path d="M8 70C8 70,40 55,50 50C60 45,92 30,92 30" stroke="rgba(255,255,255,.2)" stroke-width="2.5"/></svg><div class="back-name">'+escHtml(m.name)+'</div><div class="back-sub">'+escHtml(m.grade||'')+'</div>'+details+'</div></div>'+del+'</div>';
      cardIdx++;
    });
    html+='</div></div>';
  });
  area.innerHTML=html;

  const gradeCounts=GRADE_ORDER.filter(g=>g).map(g=>({label:g,count:grouped[g].length})).filter(x=>x.count>0);
  let sh='<div class="stats"><div class="stats-inner">';
  gradeCounts.forEach((gc,i)=>{ if(i>0) sh+='<div class="stat-sep"></div>'; sh+='<div class="stat-item"><div class="stat-num" style="color:rgba(255,255,255,.8)">'+gc.count+'</div><div class="stat-label">'+gc.label+'</div></div>'; });
  sh+='<div class="stat-sep"></div><div class="stat-item"><div class="stat-num" style="color:#ffb74d">'+members.length+'</div><div class="stat-label">合計</div></div></div></div>';
  statsArea.innerHTML=sh;
}

// JSON
function exportJSON(){
  const data=members.map(m=>({name:m.name,grade:m.grade,origin:m.origin,vhistory:m.vhistory,hobby:m.hobby,photo:m.photo||null}));
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob); const a=document.createElement('a'); a.href=url; a.download='cav-members.json';
  document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
  showToast('JSONをエクスポートしました 📤');
}
function importJSON(ev){
  const file=ev.target.files?.[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=(e)=>{
    try{
      const data=JSON.parse(e.target.result); if(!Array.isArray(data)) throw new Error();
      let c=0; data.forEach(d=>{ if(!d.name)return; members.push({id:Date.now()+Math.random(),name:d.name,grade:d.grade||'',origin:d.origin||'',vhistory:d.vhistory||'',hobby:d.hobby||'',photo:d.photo||null}); c++; });
      save(); render(); showToast(c+'人をインポートしました 📥');
    }catch(err){showToast('JSONの読み込みに失敗しました');}
    ev.target.value='';
  };
  reader.readAsText(file);
}
function showToast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.remove('hide'); clearTimeout(t._timer); t._timer=setTimeout(()=>t.classList.add('hide'),2500); }
function escHtml(s){ const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }
init();
</script>
